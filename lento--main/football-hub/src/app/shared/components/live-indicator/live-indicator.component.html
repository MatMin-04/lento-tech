<div class="flex items-center gap-1.5 px-2 py-1 rounded-md bg-red-500/10 text-red-500 text-xs font-bold tracking-wide">
  <span class="relative flex h-2 w-2">
    <span class="animate-live-pulse absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
  </span>
  <span *ngIf="minute">{{ minute }}'</span>
  <span *ngIf="!minute">LIVE</span>
</div>
