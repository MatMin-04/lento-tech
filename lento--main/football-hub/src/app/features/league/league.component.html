<div class="py-6 content-container min-h-screen">
  
  <header class="mb-8 flex items-center gap-4">
    <a routerLink="/" class="text-slate-400 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </a>
    <h1 class="text-3xl font-bold text-white">Campionato</h1>
  </header>

  <main>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" *ngIf="matches$ | async as matches">
      <app-match-card *ngFor="let match of matches" [match]="match" [routerLink]="['/match', match.id]"></app-match-card>
      
      <div *ngIf="matches.length === 0" class="col-span-full py-16 text-center text-slate-500 border-2 border-dashed border-slate-700 rounded-2xl">
        Nessuna partita disponibile per il campionato selezionato.
      </div>
    </div>
  </main>
</div>
